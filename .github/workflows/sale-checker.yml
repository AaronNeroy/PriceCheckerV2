name: Supermarket Sale Checker

on:
  schedule:
    # Runs every Monday at 8:00 AM AEST (Sunday 10:00 PM UTC)
    - cron: "0 22 * * 0"
  workflow_dispatch: # Allows manual runs from the GitHub Actions tab

jobs:
  check-sales:
    runs-on: ubuntu-latest
    permissions:
      issues: write  # Required to create GitHub issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Check Coles prices
        run: python check_coles.py

      - name: Check Woolworths prices
        run: python check_woolworths.py

      - name: Create GitHub issue if sales found
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python create_issue.py
